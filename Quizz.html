<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Legend Are You?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Metamorphous&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ───────────────────────────────────────────────────
   BASE RESET & VARS
─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Dark mode defaults */
  --bg:          #0B0805;
  --bg2:         #130E07;
  --panel:       rgba(15,10,4,0.93);
  --gold:        #C9920A;
  --gold-lt:     #E6B835;
  --gold-pale:   #F5E8A0;
  --text:        #EFE3C2;
  --muted:       #9A8460;
  --border:      rgba(201,146,10,0.28);
  --border-lt:   rgba(201,146,10,0.5);
  --opt-bg:      rgba(255,255,255,0.03);
  --opt-hover:   rgba(201,146,10,0.09);
  --opt-sel:     rgba(201,146,10,0.14);
  --shadow:      0 24px 70px rgba(0,0,0,0.75);
}

body.light-mode {
  --bg:          #F0E5CA;
  --bg2:         #E8D8B0;
  --panel:       rgba(248,241,220,0.97);
  --gold:        #7A4E00;
  --gold-lt:     #6B3E00;
  --gold-pale:   #2A1400;
  --text:        #1A0E04;
  --muted:       #5C4020;
  --border:      rgba(122,78,0,0.32);
  --border-lt:   rgba(122,78,0,0.55);
  --opt-bg:      rgba(0,0,0,0.03);
  --opt-hover:   rgba(122,78,0,0.08);
  --opt-sel:     rgba(122,78,0,0.14);
  --shadow:      0 24px 70px rgba(0,0,0,0.18);
}

/* Load Dragon Hunter font (place the file at `fonts/DragonHunter.ttf`) */
@font-face {
  font-family: 'Dragon Hunter';
  src: url('fonts/DragonHunter.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

/* ───────────────────────────────────────────────────
  BODY & BACKGROUND
─────────────────────────────────────────────────── */
body {
  font-family: 'EB Garamond', Georgia, serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
  position: relative;
  transition: background 0.5s, color 0.4s;
}

.bg-scene {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  transition: opacity 0.6s;
}
.bg-chars {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 940px;
  opacity: 0.11;
  filter: saturate(0) contrast(1.25) brightness(0.9);
  object-fit: contain;
  object-position: bottom center;
  pointer-events: none;
}
body.light-mode .bg-chars { filter: saturate(0) contrast(0.9) brightness(1.1); opacity: 0.09; }

.bg-glow-center {
  position: absolute;
  bottom: -25%;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 800px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(201,146,10,0.07) 0%, transparent 65%);
  pointer-events: none;
}
.bg-fog {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom,
    rgba(11,8,5,0.35) 0%,
    transparent 25%,
    transparent 65%,
    rgba(11,8,5,0.9) 100%
  );
  pointer-events: none;
}
body.light-mode .bg-fog {
  background: linear-gradient(to bottom,
    rgba(240,229,202,0.4) 0%,
    transparent 25%,
    transparent 65%,
    rgba(240,229,202,0.85) 100%
  );
}
.bg-vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.65) 100%);
  pointer-events: none;
}
body.light-mode .bg-vignette {
  background: radial-gradient(ellipse at center, transparent 35%, rgba(100,70,20,0.18) 100%);
}
body.result-showing .bg-scene { opacity: 0.22; }

/* ───────────────────────────────────────────────────
   LAYOUT
─────────────────────────────────────────────────── */
#app {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 2.5rem 1.25rem 5rem;
}

/* ───────────────────────────────────────────────────
   MODE TOGGLE
─────────────────────────────────────────────────── */
.mode-toggle {
  position: fixed;
  top: 18px;
  right: 18px;
  z-index: 200;
}
.mode-btn {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  background: var(--panel);
  color: var(--gold-lt);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 7px 16px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: all 0.25s;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
.mode-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0) 70%);
  transform: translateX(-100%);
  transition: transform 0.5s;
}
.mode-btn:hover::after { transform: translateX(100%); }
.mode-btn:hover { border-color: var(--border-lt); box-shadow: 0 0 14px rgba(201,146,10,0.2); }

/* ───────────────────────────────────────────────────
   SHARED ANIMATIONS
─────────────────────────────────────────────────── */
@keyframes rise {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes portraitIn {
  from { opacity: 0; transform: scale(0.9) translateY(16px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes flicker {
  0%, 100% { opacity: 1; }
  45%       { opacity: 0.85; }
  55%       { opacity: 0.95; }
}
@keyframes runeGlow {
  0%,100% { text-shadow: 0 0 6px rgba(201,146,10,0.3); }
  50%     { text-shadow: 0 0 18px rgba(201,146,10,0.7), 0 0 40px rgba(201,146,10,0.2); }
}
@keyframes borderPulse {
  0%,100% { border-color: rgba(201,146,10,0.28); }
  50%     { border-color: rgba(201,146,10,0.6); }
}
@keyframes swordIn {
  from { opacity: 0; transform: translateX(-30px) rotate(-5deg); }
  to   { opacity: 1; transform: translateX(0)      rotate(0deg); }
}

/* ───────────────────────────────────────────────────
   INTRO SCREEN
─────────────────────────────────────────────────── */
.intro-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding-top: 7vh;
  max-width: 580px;
  animation: rise 0.9s cubic-bezier(0.22,1,0.36,1) both;
}

.intro-eyebrow {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 14px;
  animation: runeGlow 3s ease-in-out infinite;
}
.intro-eyebrow::before, .intro-eyebrow::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold));
  opacity: 0.45;
  min-width: 36px;
}
.intro-eyebrow::after { background: linear-gradient(to left, transparent, var(--gold)); }

.intro-title {
  font-family: 'Metamorphous', serif;
  font-size: clamp(32px, 7.5vw, 58px);
  color: var(--gold-lt);
  line-height: 1.15;
  letter-spacing: 0.04em;
  margin-bottom: 0.6rem;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 40%, var(--gold-pale) 60%, var(--gold-lt) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 5s linear infinite, rise 0.9s cubic-bezier(0.22,1,0.36,1) both;
}
body.light-mode .intro-title {
  background: linear-gradient(135deg, #7A4E00 0%, #5C3800 40%, #3D2000 60%, #5C3800 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 5s linear infinite;
}

.intro-subtitle {
  font-family: 'Cinzel', serif;
  font-size: clamp(12px, 2vw, 15px);
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 2.25rem;
}

.intro-divider {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 2rem;
}
.div-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--border-lt), transparent); }
.div-g { color: var(--gold); font-size: 14px; animation: runeGlow 3s ease-in-out infinite; }

.char-badges {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 2.25rem;
}
.char-badge {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 6px 16px;
  border-radius: 3px;
  border: 1px solid;
  cursor: default;
  transition: transform 0.18s, box-shadow 0.18s;
}
.char-badge:hover { transform: translateY(-2px); }
.cb-baldric { color: #7AA8E8; border-color: #2855A0; background: rgba(40,85,160,0.14); }
.cb-baldric:hover { box-shadow: 0 4px 16px rgba(40,85,160,0.35); }
.cb-helga   { color: #E87070; border-color: #8B2020; background: rgba(139,32,32,0.14); }
.cb-helga:hover { box-shadow: 0 4px 16px rgba(139,32,32,0.35); }
.cb-sera    { color: #C070E8; border-color: #7B28A0; background: rgba(123,40,160,0.14); }
.cb-sera:hover { box-shadow: 0 4px 16px rgba(123,40,160,0.35); }
.cb-fen     { color: #70C870; border-color: #2A6B2A; background: rgba(42,107,42,0.14); }
.cb-fen:hover { box-shadow: 0 4px 16px rgba(42,107,42,0.35); }

.intro-lore {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 17px;
  color: var(--muted);
  line-height: 1.8;
  margin-bottom: 2.5rem;
  max-width: 430px;
}

/* ─ Start button ─ */
.btn-start {
  font-family: 'Metamorphous', serif;
  font-size: 15px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-lt);
  border: 1px solid var(--gold);
  border-radius: 3px;
  padding: 16px 48px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  background: transparent;
  transition: color 0.25s, border-color 0.25s, box-shadow 0.25s;
  animation: borderPulse 3s ease-in-out infinite;
}
.btn-start::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg,
    rgba(201,146,10,0) 0%,
    rgba(201,146,10,0.18) 50%,
    rgba(201,146,10,0) 100%
  );
  background-size: 200% 200%;
  transform: translateX(-100%);
  transition: transform 0.45s ease;
}
.btn-start:hover::before { transform: translateX(100%); }
.btn-start:hover {
  color: var(--gold-pale);
  border-color: var(--gold-lt);
  box-shadow: 0 0 28px rgba(201,146,10,0.22), inset 0 0 20px rgba(201,146,10,0.06);
  animation: none;
}
.btn-start:active { transform: scale(0.97); }
.btn-start .btn-sparks {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* ───────────────────────────────────────────────────
   QUIZ CARD
─────────────────────────────────────────────────── */
.quiz-card {
  width: 100%;
  max-width: 680px;
  /* parchment / scroll look */
  background: linear-gradient(180deg,#fbf3df 0%, #f2e7c9 60%, #e8d9b0 100%);
  background-image: repeating-linear-gradient(transparent, transparent 24px, rgba(0,0,0,0.02) 25px), radial-gradient(circle at 10% 10%, rgba(0,0,0,0.02) 0, transparent 25%);
  background-blend-mode: overlay, normal;
  border: 6px solid rgba(90,60,30,0.18);
  border-radius: 8px;
  padding: 3rem 2.25rem;
  position: relative;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 6px 24px rgba(0,0,0,0.06);
  font-family: 'Dragon Hunter', 'EB Garamond', serif;
  animation: rise 0.45s cubic-bezier(0.22,1,0.36,1) both;
  transition: background 0.5s, border-color 0.4s;
}
.quiz-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  opacity: 0.55;
  border-radius: 5px 5px 0 0;
  animation: flicker 4s ease-in-out infinite;
}
.corner {
  position: absolute;
  font-size: 15px;
  color: var(--gold);
  opacity: 0.35;
  animation: runeGlow 4s ease-in-out infinite;
}
.c-tl { top: 13px; left: 15px; }
.c-tr { top: 13px; right: 15px; animation-delay: 1s; }
.c-bl { bottom: 13px; left: 15px; animation-delay: 2s; }
.c-br { bottom: 13px; right: 15px; animation-delay: 3s; }

/* Progress */
.prog-wrap { margin-bottom: 2.25rem; }
.prog-meta {
  display: flex;
  justify-content: space-between;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 9px;
}
.prog-track {
  height: 4px;
  background: rgba(201,146,10,0.1);
  border-radius: 99px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(to right, var(--gold), var(--gold-lt));
  border-radius: 99px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 8px rgba(201,146,10,0.4);
}

/* Question */
.q-num {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.28em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 0.7rem;
  animation: runeGlow 3s ease-in-out infinite;
}
.q-text {
  font-family: 'Dragon Hunter', 'EB Garamond', serif;
  font-size: 22px;
  font-weight: 500;
  color: #3b2b12; /* darker parchment ink */
  line-height: 1.6;
  margin-bottom: 2rem;
}

/* Options */
.opts { display: flex; flex-direction: column; gap: 11px; }
.opt {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  background: linear-gradient(180deg,#fffaf0 0%, #f5e6c8 100%);
  border: 1px solid rgba(90,60,30,0.12);
  border-radius: 6px;
  padding: 14px 18px;
  cursor: pointer;
  text-align: left;
  width: 100%;
  position: relative;
  overflow: hidden;
  transition: background 0.18s, border-color 0.18s, transform 0.12s, box-shadow 0.18s;
}
.opt::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 6px;
  background: rgba(80,50,20,0.12);
  transform: scaleY(0);
  transform-origin: center;
  transition: transform 0.18s cubic-bezier(0.4,0,0.2,1);
  border-radius: 0 4px 4px 0;
}
.opt:hover {
  background: linear-gradient(180deg,#fff6e8 0%, #f0dfb8 100%);
  border-color: rgba(90,60,30,0.22);
  transform: translateX(3px);
  box-shadow: -3px 0 0 rgba(90,60,30,0.08), inset 0 0 24px rgba(0,0,0,0.04);
}
.opt:hover::before { transform: scaleY(1); }
.opt.sel {
  background: linear-gradient(180deg,#f6e7c5 0%, #f0d89a 100%);
  border-color: rgba(90,60,30,0.32);
  border-width: 1.5px;
  transform: translateX(3px);
  box-shadow: -3px 0 0 rgba(90,60,30,0.12), 0 6px 18px rgba(0,0,0,0.06);
}
.opt.sel::before { transform: scaleY(1); }
.opt-l {
  font-family: 'Metamorphous', serif;
  font-size: 13px;
  color: #8a5f2a;
  min-width: 20px;
  margin-top: 1px;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
.opt-t {
  font-family: 'Dragon Hunter', 'EB Garamond', serif;
  font-size: 17px;
  color: #3b2b12;
  line-height: 1.55;
  transition: color 0.18s;
}
.opt:hover .opt-t, .opt.sel .opt-t { color: var(--text); }

/* Next button */
.nav-row { display: flex; justify-content: flex-end; margin-top: 2rem; }
.btn-next {
  font-family: 'Metamorphous', serif;
  font-size: 13px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  background: transparent;
  color: var(--gold-lt);
  border: 1px solid var(--gold);
  border-radius: 4px;
  padding: 11px 30px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: color 0.22s, border-color 0.22s, box-shadow 0.22s, transform 0.15s;
}
.btn-next::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(201,146,10,0.15) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.4s;
}
.btn-next:hover::after { transform: translateX(100%); }
.btn-next:hover {
  border-color: var(--gold-lt);
  box-shadow: 0 0 20px rgba(201,146,10,0.2);
  color: var(--gold-pale);
}
.btn-next:active { transform: scale(0.97); }
.btn-next:disabled {
  color: rgba(154,132,96,0.3);
  border-color: rgba(201,146,10,0.12);
  cursor: not-allowed;
  box-shadow: none;
}
.btn-next:disabled::after { display: none; }

/* ───────────────────────────────────────────────────
   RESULT SCREEN
─────────────────────────────────────────────────── */
/* Full-bleed themed backgrounds */
body.theme-baldric.result-showing   { background: linear-gradient(160deg, #060C1A 0%, #0C1A38 45%, #111F45 100%) !important; }
body.theme-helga.result-showing     { background: linear-gradient(160deg, #150505 0%, #280A0A 45%, #370D0D 100%) !important; }
body.theme-seraphine.result-showing { background: linear-gradient(160deg, #100718 0%, #1E0B30 45%, #290D42 100%) !important; }
body.theme-fenwick.result-showing   { background: linear-gradient(160deg, #050D05 0%, #0C1E0C 45%, #101F10 100%) !important; }

body.light-mode.theme-baldric.result-showing   { background: linear-gradient(160deg, #C5D4F0 0%, #A8C0EB 45%, #90AADF 100%) !important; }
body.light-mode.theme-helga.result-showing     { background: linear-gradient(160deg, #F0C5C5 0%, #EAA0A0 45%, #DF8888 100%) !important; }
body.light-mode.theme-seraphine.result-showing { background: linear-gradient(160deg, #E8C5F0 0%, #DFA0EB 45%, #D088DF 100%) !important; }
body.light-mode.theme-fenwick.result-showing   { background: linear-gradient(160deg, #C5F0C5 0%, #A0EAA0 45%, #88DF88 100%) !important; }

.result-card {
  width: 100%;
  max-width: 620px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 2.75rem 2.25rem;
  position: relative;
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow);
  animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) both;
  transition: background 0.5s;
}
body.result-showing .result-card {
  background: rgba(0,0,0,0.38) !important;
  border-color: rgba(255,255,255,0.1) !important;
}
body.light-mode.result-showing .result-card {
  background: rgba(255,255,255,0.42) !important;
  border-color: rgba(0,0,0,0.1) !important;
}
.result-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: 5px 5px 0 0;
  opacity: 0.7;
  animation: flicker 3s ease-in-out infinite;
}
body.theme-baldric .result-card::before { background: linear-gradient(to right, transparent, #4A80E8, transparent); }
body.theme-helga   .result-card::before { background: linear-gradient(to right, transparent, #E84040, transparent); }
body.theme-seraphine .result-card::before { background: linear-gradient(to right, transparent, #B040E8, transparent); }
body.theme-fenwick .result-card::before { background: linear-gradient(to right, transparent, #40B040, transparent); }

.r-card-corner { position: absolute; font-size: 15px; color: var(--gold); opacity: 0.38; }
.r-tl { top: 13px; left: 15px; }
.r-tr { top: 13px; right: 15px; }
.r-bl { bottom: 13px; left: 15px; }
.r-br { bottom: 13px; right: 15px; }

/* Portrait */
.result-portrait-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-bottom: 1.75rem;
}
.result-portrait {
  width: 280px;
  max-width: 82vw;
  border-radius: 6px;
  border: 1px solid var(--border);
  box-shadow: 0 10px 40px rgba(0,0,0,0.65);
  display: block;
  animation: portraitIn 0.7s cubic-bezier(0.22,1,0.36,1) both 0.1s;
  object-fit: cover;
}

/* Result top */
.result-top { text-align: center; margin-bottom: 1.5rem; }
.result-emblem { font-size: 52px; display: block; margin-bottom: 0.85rem; animation: runeGlow 2.5s ease-in-out infinite; }
.result-iam {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.6rem;
  display: block;
  animation: runeGlow 3s ease-in-out infinite;
}
.result-name {
  font-family: 'Metamorphous', serif;
  font-size: clamp(32px, 7vw, 52px);
  letter-spacing: 0.05em;
  line-height: 1.15;
  margin-bottom: 0.4rem;
  animation: swordIn 0.6s cubic-bezier(0.22,1,0.36,1) both 0.2s;
  filter: drop-shadow(0 0 20px currentColor);
}
.result-title {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 17px;
  color: var(--muted);
  margin-bottom: 1.1rem;
}
.traits-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.trait {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 13px;
  border-radius: 99px;
  border: 1px solid;
  transition: transform 0.18s;
}
.trait:hover { transform: translateY(-2px); }

/* Dividers */
.rdiv {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 1.5rem 0;
  opacity: 0.4;
}
.rdiv-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }
.rdiv-g { color: var(--gold); font-size: 13px; }

/* Description */
.result-desc {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 17px;
  color: var(--muted);
  line-height: 1.85;
  margin-bottom: 1.75rem;
  border-left: 2px solid rgba(201,146,10,0.35);
  padding-left: 1.1rem;
}
body.light-mode .result-desc { color: var(--text); }

/* Retry button */
.btn-retry {
  font-family: 'Metamorphous', serif;
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 26px;
  cursor: pointer;
  display: block;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  transition: color 0.22s, border-color 0.22s, box-shadow 0.22s;
}
.btn-retry::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(201,146,10,0.12) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.4s;
}
.btn-retry:hover::after { transform: translateX(100%); }
.btn-retry:hover { border-color: var(--gold); color: var(--text); box-shadow: 0 0 16px rgba(201,146,10,0.15); }
.btn-retry:active { transform: scale(0.97); }

@media (max-width: 480px) {
  .quiz-card, .result-card { padding: 2rem 1.25rem; }
  .intro-wrap { padding-top: 4vh; }
  .q-text { font-size: 18px; }
  .opt-t { font-size: 15px; }
}
</style>
</head>

let screen = 'intro';
let qIdx = 0;
let answered = new Array(QUESTIONS.length).fill(null);
let scores = {baldric:0,helga:0,seraphine:0,fenwick:0};
const LETTERS = ['A','B','C','D'];

// ─── Render ──────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  // Remove any theme/result-only classes but preserve user's mode and other classes
  Array.from(document.body.classList).forEach(c => {
    if (c.startsWith('theme-') || c === 'result-showing') document.body.classList.remove(c);
  });
  if (screen === 'intro') renderIntro(app);
  else if (screen === 'quiz') renderQuiz(app);
  else renderResult(app);
}

function renderIntro(app) {
  app.innerHTML = `
    <div class="intro-wrap">
      <div class="intro-eyebrow">The Realm Quiz</div>
      <h1 class="intro-title">Which Legend<br>Are You?</h1>
      <p class="intro-subtitle">A scroll of character & fate</p>
      <div class="intro-divider"><div class="div-line"></div><span class="div-g">⚜</span><div class="div-line"></div></div>
      <div class="char-badges">
        <span class="char-badge cb-baldric">⚔ Baldric</span>
        <span class="char-badge cb-helga">🛡 Helga</span>
        <span class="char-badge cb-sera">✨ Seraphine</span>
        <span class="char-badge cb-fen">🌿 Fenwick</span>
      </div>
      <p class="intro-lore">Four legends. Eight questions. One truth. Answer with honesty, traveller — the scroll does not lie.</p>
      <button class="btn-start" onclick="startQuiz()">Begin the Quest →</button>
    </div>`;
}

function renderQuiz(app) {
  const q = QUESTIONS[qIdx];
  const pct = (qIdx / QUESTIONS.length) * 100;
  const hasSel = answered[qIdx] !== null;
  app.innerHTML = `
    <div class="quiz-card">
      <span class="corner c-tl">✦</span><span class="corner c-tr">✦</span>
      <span class="corner c-bl">✦</span><span class="corner c-br">✦</span>
      <div class="prog-wrap">
        <div class="prog-meta"><span>Question ${qIdx+1} of ${QUESTIONS.length}</span><span>${Math.round(pct)}%</span></div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
      <p class="q-num">The ${ordinal(qIdx+1)} Scroll</p>
      <p class="q-text">${q.text}</p>
      <div class="opts" id="opts"></div>
      <div class="nav-row">
        <button class="btn-next" id="btn-next" ${hasSel?'':'disabled'} onclick="nextQ()">
          ${qIdx < QUESTIONS.length-1 ? 'Continue →' : 'Reveal my fate →'}
        </button>
      </div>
    </div>`;
  const oc = document.getElementById('opts');
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (answered[qIdx]===i?' sel':'');
    btn.innerHTML = `<span class="opt-l">${LETTERS[i]}</span><span class="opt-t">${opt.t}</span>`;
    btn.onclick = () => pick(i);
    oc.appendChild(btn);
  });
}

function renderResult(app) {
  const winner = Object.keys(scores).reduce((a,b) => scores[a]>=scores[b]?a:b);
  const c = CHARS[winner];
  const lightMode = document.body.classList.contains('light-mode');
  const existingClasses = Array.from(document.body.classList).filter(c => c === 'light-mode');
  document.body.className = [...existingClasses, 'theme-' + winner, 'result-showing'].join(' ');

  const pills = c.traits.map(t =>
    `<span class="trait" style="background:${c.traitBg};color:${c.traitColor};border-color:${c.traitBorder};">${t}</span>`
  ).join('');

  app.innerHTML = `
    <div class="result-card">
      <span class="r-card-corner r-tl">✦</span><span class="r-card-corner r-tr">✦</span>
      <span class="r-card-corner r-bl">✦</span><span class="r-card-corner r-br">✦</span>
      <div class="result-portrait-wrap"><img class="result-portrait" src="${c.portrait}" alt="${c.name}" /></div>
      <div class="result-top">
        <span class="result-emblem">${c.icon}</span>
        <span class="result-iam">✦ You are ✦</span>
        <h2 class="result-name" style="color:${c.nameColor};">${c.name}</h2>
        <p class="result-title">${c.title}</p>
        <div class="traits-row">${pills}</div>
      </div>
      <div class="rdiv"><div class="rdiv-line"></div><span class="rdiv-g">⚜</span><div class="rdiv-line"></div></div>
      <p class="result-desc">"${c.desc}"</p>
      <button class="btn-retry" onclick="restart()">↺ Consult the scroll again</button>
    </div>`;
}

// ─── Actions ─────────────────────────────────────────────────────────────
function startQuiz() { screen='quiz'; qIdx=0; document.body.classList.toggle('light-mode', !isDark); render(); }

function pick(i) {
  const prev = answered[qIdx];
  if (prev!==null) Object.keys(scores).forEach(k => scores[k] -= QUESTIONS[qIdx].opts[prev].s[k]);
  answered[qIdx] = i;
  Object.keys(scores).forEach(k => scores[k] += QUESTIONS[qIdx].opts[i].s[k]);
  render();
}

function nextQ() {
  if (answered[qIdx]===null) return;
  if (qIdx < QUESTIONS.length-1) { qIdx++; render(); }
  else { screen='result'; render(); }
}

function restart() {
  screen='intro'; qIdx=0;
  answered = new Array(QUESTIONS.length).fill(null);
  scores = {baldric:0,helga:0,seraphine:0,fenwick:0};
  document.body.classList.toggle('light-mode', !isDark);
  render();
}

function ordinal(n) {
  const s = ['first','second','third','fourth','fifth','sixth','seventh','eighth'];
  return s[n-1] || n+'th';
}


// ─── Theme Mode ──────────────────────────────────────────────────────────
let isDark = true;
// Initialize theme from localStorage (persist user choice across navigation)
const savedTheme = (function(){ try { return localStorage.getItem('theme'); } catch(e){ return null; } })();
if (savedTheme === 'light') isDark = false;
else if (savedTheme === 'dark') isDark = true;
// Apply initial class without clobbering other classes
document.body.classList.toggle('light-mode', !isDark);

function updateModeButton() {
  const btn = document.getElementById('mode-btn');
  if (!btn) return;
  btn.textContent = isDark ? '☀ Light Mode' : '🌑 Dark Mode';
}

function toggleMode() {
  isDark = !isDark;
  document.body.classList.toggle('light-mode', !isDark);
  try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch(e){}
  updateModeButton();
}

// Ensure the button text is updated once the DOM is parsed
window.addEventListener('DOMContentLoaded', updateModeButton);

// ─── Boot ────────────────────────────────────────────────────────────────
document.getElementById('bg-img').src = 'data:image/jpeg;base64,' + CHAR_IMG_B64;
render();
</script>

<div class="mode-toggle">
  <button class="mode-btn" onclick="toggleMode()" id="mode-btn">☀ Light Mode</button>
</div>

</body>
